<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール - GIRON</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-4 mb-5 text-center">
    <!-- プロフィール情報 -->
    <div class="mb-4">
      <div class="bg-secondary rounded-circle d-inline-block" style="width: 80px; height: 80px;"></div>
      <h3 class="mt-2 fw-bold">ユーザー名</h3>
      <p class="text-muted">ここに自己紹介が入ります。</p>
    </div>

    <!-- 切り替えタブ -->
    <ul class="nav nav-pills justify-content-center mb-3">
      <li class="nav-item"><a class="nav-link active" href="#">自分の投稿</a></li>
      <li class="nav-item"><a class="nav-link text-secondary" href="#">スター</a></li>
    </ul>

    <!-- 投稿履歴のカード -->
    <div class="card shadow-sm mb-3 text-start border-0">
      <div class="card-body">
        <p class="card-text">過去に投稿した意見がここに表示されます。</p>
      </div>
    </div>
  </div>
</body>
</html>
